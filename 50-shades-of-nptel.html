<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50 Shades of NPTEL — Deep Learning MCQ</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ── */
:root {
  --bg:        #08101c;
  --bg2:       #0c1525;
  --surface:   #0f1c2e;
  --surface2:  #142338;
  --surface3:  #1a2c44;
  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.10);
  --accent:    #00d4b4;
  --accent-s:  rgba(0,212,180,0.08);
  --accent-h:  rgba(0,212,180,0.14);
  --correct:   #22c55e;
  --correct-s: rgba(34,197,94,0.10);
  --wrong:     #f43f5e;
  --wrong-s:   rgba(244,63,94,0.10);
  --text:      #dde6f0;
  --text2:     #7a8fa6;
  --text3:     #3d5068;
  --mono:      'JetBrains Mono', monospace;
  --sans:      'Satoshi', -apple-system, sans-serif;
  --r:         10px;
  --r2:        16px;
  --hh:        56px;
  --sw:        228px;
}

/* ── RESET ── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:15px;
  line-height:1.6;
}
button { font-family:var(--sans); cursor:pointer; }
input  { font-family:var(--sans); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:3px; }

/* ── HEADER ── */
.header {
  position:sticky; top:0; z-index:200;
  height:var(--hh);
  background:rgba(8,16,28,0.88);
  backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:16px;
  padding:0 20px;
}
.hamburger {
  display:none; flex-direction:column; justify-content:center; gap:5px;
  width:36px; height:36px; background:none; border:none; cursor:pointer; padding:4px;
  flex-shrink:0;
}
.hamburger span {
  display:block; width:100%; height:2px;
  background:var(--text2); border-radius:2px;
  transition:transform 0.2s, opacity 0.2s, background 0.2s;
}
.hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity:0; }
.hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

.logo {
  display:flex; align-items:baseline; gap:8px; text-decoration:none; flex-shrink:0;
}
.logo-num {
  font-family:var(--mono); font-size:18px; font-weight:700;
  color:var(--accent); letter-spacing:-1px;
}
.logo-text {
  font-size:13px; font-weight:700; color:var(--text2);
  letter-spacing:0.04em; text-transform:uppercase;
}
.logo-sep { color:var(--text3); }

.header-mid {
  flex:1; display:flex; align-items:center; justify-content:center; gap:12px;
}
.header-week-name {
  font-size:13px; font-weight:700; color:var(--text2);
  display:none;
}
.header-counter {
  font-family:var(--mono); font-size:11px;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:20px; padding:3px 10px; color:var(--text2);
  display:none;
}
.header-counter.visible { display:block; }
.header-counter em { color:var(--accent); font-style:normal; font-weight:700; }

/* ── OVERLAY ── */
.overlay {
  display:none; position:fixed; inset:0; z-index:150;
  background:rgba(8,16,28,0.7); backdrop-filter:blur(2px);
}
.overlay.open { display:block; }

/* ── LAYOUT ── */
.layout {
  display:flex;
  min-height:calc(100vh - var(--hh));
  position:relative;
}

/* ── SIDEBAR ── */
.sidebar {
  width:var(--sw); flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  position:sticky; top:var(--hh);
  height:calc(100vh - var(--hh));
  overflow-y:auto; overflow-x:hidden;
  padding:16px 0 24px;
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.sb-label {
  font-family:var(--mono); font-size:9px; font-weight:700;
  letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text3); padding:0 16px; margin-bottom:6px; margin-top:12px;
  display:block;
}
.sb-btn {
  display:flex; align-items:center; gap:10px;
  width:100%; padding:9px 16px;
  background:none; border:none; text-align:left;
  font-size:13px; font-weight:600; color:var(--text2);
  border-left:3px solid transparent;
  transition:background 0.15s, color 0.15s, border-color 0.15s;
  cursor:pointer; position:relative;
}
.sb-btn:hover { background:var(--surface); color:var(--text); }
.sb-btn.active { background:var(--accent-h); border-left-color:var(--accent); color:var(--text); }
.sb-dot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
  opacity:0.7; transition:opacity 0.15s;
}
.sb-btn.active .sb-dot { opacity:1; }
.sb-count {
  margin-left:auto;
  font-family:var(--mono); font-size:10px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:10px; padding:1px 7px; color:var(--text3);
  flex-shrink:0;
}
.sb-btn.active .sb-count { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }

/* ── MAIN ── */
.main { flex:1; min-width:0; padding:36px 40px 80px; max-width:860px; }

/* ── HOME ── */
.home-hero {
  padding-bottom:40px;
  border-bottom:1px solid var(--border);
  margin-bottom:36px;
}
.home-hero-eyebrow {
  font-family:var(--mono); font-size:10px; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--accent);
  margin-bottom:16px; display:block;
}
.home-hero h1 {
  font-size:clamp(36px,5vw,56px); font-weight:900; line-height:1.06;
  letter-spacing:-0.02em; margin-bottom:14px;
}
.home-hero h1 .shade { 
  position:relative; display:inline-block;
  background:linear-gradient(90deg,var(--accent),#3b82f6 60%,#a855f7);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.home-hero p { font-size:15px; color:var(--text2); max-width:520px; margin-bottom:28px; }
.home-stats {
  display:flex; flex-wrap:wrap; gap:24px;
}
.home-stat { text-align:left; }
.home-stat .val {
  font-family:var(--mono); font-size:26px; font-weight:700;
  color:var(--text); display:block; line-height:1;
}
.home-stat .lbl { font-size:11px; color:var(--text3); margin-top:4px; text-transform:uppercase; letter-spacing:0.08em; }

.home-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.week-card {
  background:var(--surface); border:1px solid var(--border);
  border-left:3px solid var(--wc, var(--accent));
  border-radius:var(--r); padding:18px 16px;
  cursor:pointer; text-decoration:none; color:inherit;
  display:block; transition:transform 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
.week-card:hover {
  transform:translateY(-2px);
  background:var(--surface2);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  border-color:color-mix(in srgb, var(--wc, var(--accent)) 50%, transparent);
}
.wc-num {
  font-family:var(--mono); font-size:10px; letter-spacing:0.15em;
  text-transform:uppercase; color:var(--text3); margin-bottom:8px; display:block;
}
.wc-title { font-size:14px; font-weight:700; margin-bottom:4px; color:var(--text); }
.wc-sub { font-size:12px; color:var(--text2); line-height:1.45; margin-bottom:14px; }
.wc-foot { display:flex; align-items:center; justify-content:space-between; }
.wc-count { font-family:var(--mono); font-size:11px; color:var(--accent); font-weight:700; }
.wc-arrow { color:var(--text3); font-size:16px; transition:transform 0.15s, color 0.15s; }
.week-card:hover .wc-arrow { transform:translateX(4px); color:var(--text2); }

/* ── WEEK VIEW ── */
.week-hd { margin-bottom:28px; }
.week-hd-top {
  display:flex; align-items:center; gap:10px; margin-bottom:16px;
}
.back-btn {
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:6px; padding:5px 12px;
  font-size:12px; font-weight:700; color:var(--text2);
  cursor:pointer; transition:all 0.15s; text-decoration:none; display:inline-flex; align-items:center; gap:6px;
}
.back-btn:hover { border-color:var(--accent); color:var(--accent); }
.week-tag-pill {
  font-family:var(--mono); font-size:10px; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--accent);
  border:1px solid rgba(0,212,180,0.3); border-radius:4px; padding:3px 9px;
}
.week-hd h2 { font-size:clamp(22px,3vw,30px); font-weight:900; letter-spacing:-0.02em; margin-bottom:6px; }
.week-hd-sub { font-size:13px; color:var(--text2); margin-bottom:16px; }
.week-topics { display:flex; flex-wrap:wrap; gap:8px; }
.topic-chip {
  font-size:11px; font-weight:600;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:20px; padding:3px 11px; color:var(--text2);
}

/* ── SEARCH & FILTER ── */
.controls { margin-bottom:20px; display:flex; flex-direction:column; gap:12px; }
.search-wrap {
  position:relative;
}
.search-icon {
  position:absolute; left:13px; top:50%; transform:translateY(-50%);
  color:var(--text3); font-size:16px; pointer-events:none; line-height:1;
}
.search-input {
  width:100%; padding:10px 40px 10px 38px;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:var(--r); color:var(--text); font-size:14px; font-weight:500;
  outline:none; transition:border-color 0.15s, background 0.15s;
}
.search-input::placeholder { color:var(--text3); }
.search-input:focus { border-color:rgba(0,212,180,0.4); background:var(--surface2); }
.search-count {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  font-family:var(--mono); font-size:11px; color:var(--text3);
  pointer-events:none;
}

.filter-row { display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
.filter-label { font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:0.1em; text-transform:uppercase; margin-right:2px; }
.filter-chip {
  font-size:11px; font-weight:600;
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:4px 12px; color:var(--text2);
  cursor:pointer; transition:all 0.15s;
}
.filter-chip:hover { border-color:var(--border2); color:var(--text); }
.filter-chip.active { background:var(--accent-h); border-color:rgba(0,212,180,0.4); color:var(--accent); }

/* ── QUESTION CARDS ── */
.q-list { display:flex; flex-direction:column; gap:12px; }
.q-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--surface3);
  border-radius:var(--r);
  transition:border-color 0.2s, box-shadow 0.2s;
  animation:fadeUp 0.3s ease both;
}
.q-card:hover { border-right-color:var(--border2); }
.q-card.state-correct { border-left-color:var(--correct); }
.q-card.state-wrong   { border-left-color:var(--wrong); }
.q-card.state-revealed { border-left-color:var(--accent); }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

.q-head {
  padding:16px 18px 12px;
  display:flex; align-items:flex-start; gap:12px;
}
.q-num {
  font-family:var(--mono); font-size:11px; font-weight:700;
  color:var(--text3); flex-shrink:0; min-width:26px;
  line-height:1.8;
}
.q-text {
  flex:1; font-size:14.5px; font-weight:600; line-height:1.55;
  color:var(--text);
}
.q-tag {
  flex-shrink:0; margin-top:2px;
  font-size:10px; font-family:var(--mono); font-weight:500;
  background:var(--accent-s); border:1px solid rgba(0,212,180,0.18);
  color:var(--accent); border-radius:4px; padding:2px 8px;
  white-space:nowrap; max-width:160px; overflow:hidden;
  text-overflow:ellipsis;
}

.q-opts {
  padding:0 18px 12px 56px;
  display:grid; gap:6px;
}
.opt-btn {
  display:flex; align-items:flex-start; gap:9px;
  padding:10px 13px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; text-align:left; width:100%;
  font-size:13px; font-weight:600; color:var(--text2);
  transition:background 0.12s, border-color 0.12s, color 0.12s;
}
.opt-btn:not(.opt-locked):hover {
  background:var(--surface3); border-color:var(--border2); color:var(--text);
}
.opt-btn:not(.opt-locked):focus-visible {
  outline:2px solid var(--accent); outline-offset:2px;
}
.opt-letter {
  font-family:var(--mono); font-size:10px; font-weight:700;
  flex-shrink:0; opacity:0.5; margin-top:1px; line-height:1.6;
}
.opt-text { flex:1; }
.opt-indicator { flex-shrink:0; margin-top:1px; font-size:14px; line-height:1.4; }

.opt-btn.opt-locked { cursor:default; }
.opt-btn.opt-correct {
  background:var(--correct-s); border-color:rgba(34,197,94,0.35); color:var(--correct);
}
.opt-btn.opt-correct .opt-letter { opacity:0.7; }
.opt-btn.opt-correct .opt-indicator::after { content:'✓'; }
.opt-btn.opt-wrong {
  background:var(--wrong-s); border-color:rgba(244,63,94,0.35); color:var(--wrong);
}
.opt-btn.opt-wrong .opt-indicator::after { content:'✗'; }

.q-foot {
  padding:8px 18px 14px 56px;
  display:flex; align-items:center; gap:14px;
}
.reveal-btn {
  padding:6px 14px; border:1px solid var(--border2);
  border-radius:6px; background:none;
  font-size:12px; font-weight:700; color:var(--text2);
  transition:all 0.15s; white-space:nowrap;
}
.reveal-btn:hover { border-color:var(--accent); color:var(--accent); }
.reveal-btn.revealed { color:var(--text3); cursor:default; border-color:var(--border); }
.ans-text {
  font-family:var(--mono); font-size:11.5px;
  color:var(--correct); opacity:0;
  transition:opacity 0.25s, transform 0.25s;
  transform:translateX(-6px);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ans-text.visible { opacity:1; transform:translateX(0); }

/* ── NO RESULTS ── */
.no-results {
  text-align:center; padding:60px 20px; color:var(--text3);
  font-size:14px;
}
.no-results strong { display:block; font-size:32px; margin-bottom:8px; color:var(--surface3); }

/* ── JUMP TO TOP ── */
.jump-top {
  position:fixed; bottom:28px; right:28px; z-index:100;
  width:42px; height:42px;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:50%; color:var(--text2);
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity 0.2s, transform 0.2s, background 0.15s, border-color 0.15s;
  transform:translateY(8px);
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.jump-top.show { opacity:1; pointer-events:all; transform:translateY(0); }
.jump-top:hover { background:var(--surface3); border-color:var(--accent); color:var(--accent); }

/* ── MOBILE ── */
@media (max-width:900px) {
  .main { padding:24px 20px 80px; }
  .home-grid { grid-template-columns:1fr 1fr; }
}
@media (max-width:680px) {
  .sidebar {
    position:fixed; top:var(--hh); left:0; bottom:0; z-index:160;
    transform:translateX(-100%);
    width:var(--sw) !important;
    box-shadow:4px 0 24px rgba(0,0,0,0.5);
  }
  .sidebar.open { transform:translateX(0); }
  .hamburger { display:flex; }
  .main { padding:20px 16px 80px; }
  .home-grid { grid-template-columns:1fr; }
  .week-hd h2 { font-size:20px; }
  .q-opts { padding-left:18px; }
  .q-foot { padding-left:18px; flex-wrap:wrap; }
  .jump-top { bottom:20px; right:16px; }
}
</style>
</head>
<body>

<header class="header">
  <button class="hamburger" id="hamburger" aria-label="Toggle menu" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
  </button>
  <a class="logo" onclick="showHome()" style="cursor:pointer">
    <span class="logo-num">50</span>
    <span class="logo-sep">|</span>
    <span class="logo-text">Shades of NPTEL</span>
  </a>
  <div class="header-mid">
    <span class="header-week-name" id="headerWeekName"></span>
    <span class="header-counter" id="headerCounter"><em id="cAnswered">0</em>/<span id="cTotal">50</span> answered</span>
  </div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <span class="sb-label">Navigate</span>
    <button class="sb-btn active" id="sb-home" onclick="showHome()">
      <span>🏠</span> Overview
    </button>
    <span class="sb-label" style="margin-top:16px">Weeks</span>
    <!-- sidebar buttons injected by JS -->
    <div id="sbWeeks"></div>
  </nav>

  <main class="main" id="main"></main>
</div>

<button class="jump-top" id="jumpTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">↑</button>

<script>
// ════════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════════
const WEEKS = {
  1:{
    title:"Single Layer Perceptron",
    subtitle:"Linear classifiers, activation functions, perceptron learning rule, Keras basics",
    color:"#7c3aed",
    topics:["SLP Fundamentals","Activation Functions","Weight Updates","Numerical Computation","Decision Boundaries"],
    questions:[
      {q:"A perceptron with two inputs and no hidden layer can correctly classify which type of dataset?",opts:["Concentric circles","XOR patterns","Linearly separable data","Multi-class spiral data"],ans:2,concept:"SLP Capabilities"},
      {q:"Which of the following is NOT a characteristic of a single layer perceptron?",opts:["It has adjustable weights","It can model non-linear boundaries","It uses a threshold activation","It has a bias term"],ans:1,concept:"SLP Fundamentals"},
      {q:"In a perceptron, the bias term b primarily serves to:",opts:["Scale the learning rate","Shift the decision boundary away from the origin","Add non-linearity","Regularise weights"],ans:1,concept:"Bias in Perceptron"},
      {q:"Which statement correctly describes the perceptron convergence theorem?",opts:["A perceptron converges on any dataset","A perceptron converges only if data is linearly separable","A perceptron never converges with noisy data","A perceptron requires exactly 100 epochs"],ans:1,concept:"Convergence Theorem"},
      {q:"The Heaviside step function outputs:",opts:["A value in [0,1] smoothly","1 if input ≥ threshold, 0 otherwise","The input value unchanged","The sigmoid of the input"],ans:1,concept:"Step Activation"},
      {q:"In Keras, which loss function is most appropriate for a single perceptron doing binary classification?",opts:["mean_squared_error","categorical_crossentropy","binary_crossentropy","sparse_categorical_crossentropy"],ans:2,concept:"Keras Loss Functions"},
      {q:"A perceptron trained with learning rate η=0 will:",opts:["Converge instantly","Never update its weights","Oscillate between solutions","Increase weights indefinitely"],ans:1,concept:"Learning Rate Effect"},
      {q:"Which of the following problems CANNOT be solved by a single layer perceptron?",opts:["AND gate","OR gate","NAND gate","XOR gate"],ans:3,concept:"SLP Limitations"},
      {q:"The net input of a perceptron is also called:",opts:["Activation output","Pre-activation or weighted sum","Gradient signal","Softmax logit"],ans:1,concept:"Net Input"},
      {q:"In Keras, model.fit() is called multiple times per iteration primarily because:",opts:["Each call processes one layer","Keras requires it by design","Multiple epochs allow iterative weight refinement","Batches must match epoch count"],ans:2,concept:"Keras Training Loop"},
      {q:"A perceptron has weights w=[2, -1], bias b=1. For input x=[3, 4], the net input z equals:",opts:["3","4","2","1"],ans:0,concept:"Net Input Computation"},
      {q:"Using a step function (threshold=0), what is the output for net input z=−0.001?",opts:["1","0","0.5","−1"],ans:1,concept:"Step Function"},
      {q:"Perceptron weights w=[0.5, 0.5], bias b=−0.5, input x=[1,1]. Using step activation (θ=0), output is:",opts:["0","0.5","1","Undefined"],ans:2,concept:"Perceptron Forward Pass"},
      {q:"A perceptron predicts ŷ=1, target y=0. With learning rate η=0.2, the weight update Δwᵢ for input xᵢ=3 is:",opts:["−0.6","0.6","−0.2","0.2"],ans:0,concept:"Weight Update Rule"},

function buildSidebar() {
  const el = document.getElementById('sbWeeks');
  el.innerHTML = Object.keys(WEEKS).map(n => {
    const w = WEEKS[n];
    return `<button class="sb-btn" id="sb-${n}" onclick="showWeek(${n})" style="--wc:${w.color}">
      <span class="sb-dot" style="background:${w.color}"></span>
      <span style="flex:1;text-align:left">${WEEK_ICONS[n-1]} W${n}</span>
      <span class="sb-count">${w.questions.length}</span>
    </button>`;
  }).join('');
}

function setActiveSb(id) {
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

  document.getElementById('headerCounter').classList.remove('visible');
  renderHome();
  closeSidebar();
}

function showWeek(n) {
  currentWeek = n;
  currentFilter = 'all';
  searchQuery = '';
  setActiveSb('sb-' + n);
  const w = WEEKS[n];
  const nameEl = document.getElementById('headerWeekName');
  nameEl.textContent = `W${n}: ${w.title}`;
  nameEl.style.display = '';
  document.getElementById('headerCounter').classList.add('visible');
  updateCounter(n);
  renderWeek(n);
  window.scrollTo({top: 0, behavior: 'smooth'});
  closeSidebar();
}

// ════════════════════════════════════════════════════════════════
// MOBILE
// ════════════════════════════════════════════════════════════════
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const hb = document.getElementById('hamburger');
  const ov = document.getElementById('overlay');
  const open = sb.classList.toggle('open');
  hb.classList.toggle('open', open);
  ov.classList.toggle('open', open);
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ════════════════════════════════════════════════════════════════
// COUNTER
// ════════════════════════════════════════════════════════════════
function updateCounter(n) {
  const w = WEEKS[n];
  const answered = w.questions.filter((_, i) => {
    const s = gs(gk(n, i));
    return s.selected !== null || s.revealed;
  }).length;
  document.getElementById('cAnswered').textContent = answered;
  document.getElementById('cTotal').textContent = w.questions.length;
}

// ════════════════════════════════════════════════════════════════
// HOME
// ════════════════════════════════════════════════════════════════
function renderHome() {
  const total = Object.values(WEEKS).reduce((a, w) => a + w.questions.length, 0);
  document.getElementById('main').innerHTML = `
    <div class="home-hero">
      <span class="home-hero-eyebrow">NPTEL · Introduction to Deep Learning</span>
      <h1><span class="shade">50 Shades</span><br>of NPTEL</h1>
      <p>600 hand-crafted MCQs across 12 weeks. Click an option to get instant feedback, or reveal the answer in study mode. Same difficulty as the actual exam.</p>
      <div class="home-stats">
        <div class="home-stat"><span class="val">${total}</span><span class="lbl">Questions</span></div>
        <div class="home-stat"><span class="val">12</span><span class="lbl">Weeks</span></div>
        <div class="home-stat"><span class="val">50</span><span class="lbl">Per Week</span></div>
        <div class="home-stat"><span class="val">MCQ</span><span class="lbl">Format</span></div>
      </div>
    </div>
    <div class="home-grid">
      ${Object.keys(WEEKS).map(n => {
        const w = WEEKS[n];
        return `<a class="week-card" onclick="showWeek(${n})" style="--wc:${w.color}">
          <span class="wc-num">${WEEK_ICONS[n-1]} Week ${n}</span>
          <div class="wc-title">${w.title}</div>
          <div class="wc-sub">${w.subtitle}</div>
          <div class="wc-foot">
            <span class="wc-count">${w.questions.length} questions</span>
            <span class="wc-arrow">→</span>
          </div>
        </a>`;
      }).join('')}
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════
// WEEK VIEW
// ════════════════════════════════════════════════════════════════
function renderWeek(n) {
  const w = WEEKS[n];
  const concepts = [...new Set(w.questions.map(q => q.concept))];

  document.getElementById('main').innerHTML = `
    <div class="week-hd">
      <div class="week-hd-top">
        <button class="back-btn" onclick="showHome()">← Overview</button>
        <span class="week-tag-pill" style="border-color:${w.color}40;color:${w.color}">Week ${n}</span>
      </div>
      <h2>${WEEK_ICONS[n-1]} ${w.title}</h2>
      <div class="week-hd-sub">${w.subtitle}</div>
      <div class="week-topics">
        ${w.topics.map(t => `<span class="topic-chip">${t}</span>`).join('')}
      </div>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="text" placeholder="Search questions, concepts, options…" id="searchInput" value="${searchQuery}" oninput="handleSearch(event)">
        <span class="search-count" id="searchCount">${w.questions.length} questions</span>
      </div>
      <div class="filter-row">
        <span class="filter-label">Topic:</span>
        <button class="filter-chip ${currentFilter==='all'?'active':''}" onclick="setFilter('all',${n})">All</button>
        ${concepts.map(c => `<button class="filter-chip ${currentFilter===c?'active':''}" onclick="setFilter('${c.replace(/'/g,"\\'")}',${n})">${c}</button>`).join('')}
      </div>
    </div>
    <div class="q-list" id="qList">
      ${w.questions.map((q, i) => renderCard(q, i, n)).join('')}
    </div>
  `;

  applyFilters(n);
}

// ════════════════════════════════════════════════════════════════
// QUESTION CARD
// ════════════════════════════════════════════════════════════════
const OL = ['A','B','C','D'];

function renderCard(q, idx, weekNum) {
  const key = gk(weekNum, idx);
  const st = gs(key);
  const locked = st.selected !== null || st.revealed;

  let cardCls = 'q-card';
  if (st.selected !== null) cardCls += st.selected===q.ans ? ' state-correct' : ' state-wrong';
  else if (st.revealed) cardCls += ' state-revealed';

  const opts = q.opts.map((opt, oi) => {
    let cls = 'opt-btn';
    if (locked) {
      cls += ' opt-locked';
      if (oi === q.ans) cls += ' opt-correct';
      else if (oi === st.selected && st.selected !== q.ans) cls += ' opt-wrong';
    }
    return `<button class="${cls}" onclick="handleSelect(${weekNum},${idx},${oi})" aria-label="Option ${OL[oi]}"
      ${locked ? 'disabled' : ''}>
      <span class="opt-letter">${OL[oi]}</span>
      <span class="opt-text">${opt}</span>
      <span class="opt-indicator"></span>
    </button>`;
  }).join('');

  const ansVisible = locked;
  const ansText = `✓ ${OL[q.ans]}) ${q.opts[q.ans]}`;

  return `<div class="${cardCls}" id="card-${key}">
    <div class="q-head">
      <span class="q-num">${String(idx+1).padStart(2,'0')}</span>
      <p class="q-text">${q.q}</p>
      <span class="q-tag" title="${q.concept}">${q.concept}</span>
    </div>
    <div class="q-opts">${opts}</div>
    <div class="q-foot">
      <button class="reveal-btn${st.revealed?' revealed':''}" onclick="handleReveal(${weekNum},${idx})"
        ${st.revealed?'disabled':''}>
        ${st.revealed ? '✓ Revealed' : st.selected!==null ? '✓ Answered' : 'Show Answer'}
      </button>
      <span class="ans-text${ansVisible?' visible':''}">${ansText}</span>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════════════════════
function handleSelect(weekNum, idx, optionIdx) {
  const key = gk(weekNum, idx);
  const st = gs(key);
  if (st.selected !== null || st.revealed) return;

  const q = WEEKS[weekNum].questions[idx];
  cardStates[key] = {selected: optionIdx, revealed: false};

  const card = document.getElementById('card-' + key);
  if (!card) return;

  const correct = optionIdx === q.ans;
  card.classList.add(correct ? 'state-correct' : 'state-wrong');

  card.querySelectorAll('.opt-btn').forEach((btn, oi) => {
    btn.disabled = true;
    btn.classList.add('opt-locked');
    if (oi === q.ans) btn.classList.add('opt-correct');
    else if (oi === optionIdx) btn.classList.add('opt-wrong');
  });

  const ansEl = card.querySelector('.ans-text');
  if (ansEl) ansEl.classList.add('visible');

  const revBtn = card.querySelector('.reveal-btn');
  if (revBtn) { revBtn.textContent = '✓ Answered'; revBtn.disabled = true; }

  updateCounter(weekNum);
}

function handleReveal(weekNum, idx) {
  const key = gk(weekNum, idx);
  const st = gs(key);
  if (st.selected !== null || st.revealed) return;

  const q = WEEKS[weekNum].questions[idx];
  cardStates[key] = {selected: null, revealed: true};

  const card = document.getElementById('card-' + key);
  if (!card) return;

  card.classList.add('state-revealed');

  card.querySelectorAll('.opt-btn').forEach((btn, oi) => {
    btn.disabled = true;
    btn.classList.add('opt-locked');
    if (oi === q.ans) btn.classList.add('opt-correct');
  });

  const ansEl = card.querySelector('.ans-text');
  if (ansEl) ansEl.classList.add('visible');

  const revBtn = card.querySelector('.reveal-btn');
  if (revBtn) { revBtn.textContent = '✓ Revealed'; revBtn.classList.add('revealed'); revBtn.disabled = true; }

  updateCounter(weekNum);
}

// ════════════════════════════════════════════════════════════════
// SEARCH & FILTER
// ════════════════════════════════════════════════════════════════
function handleSearch(e) {
  searchQuery = e.target.value.toLowerCase().trim();
  applyFilters(currentWeek);
}

function setFilter(concept, weekNum) {
  currentFilter = concept;
  // update chip active state
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  applyFilters(weekNum);
}

function applyFilters(n) {
  if (!n) return;
  const w = WEEKS[n];
  let vis = 0;
  w.questions.forEach((q, i) => {
    const card = document.getElementById('card-' + gk(n, i));
    if (!card) return;
    const mSearch = !searchQuery ||
      q.q.toLowerCase().includes(searchQuery) ||
      q.concept.toLowerCase().includes(searchQuery) ||
      q.opts.some(o => o.toLowerCase().includes(searchQuery));
    const mFilter = currentFilter === 'all' || q.concept === currentFilter;
    const show = mSearch && mFilter;
    card.style.display = show ? '' : 'none';
    if (show) vis++;
  });
  const sc = document.getElementById('searchCount');
  if (sc) sc.textContent = `${vis} question${vis !== 1 ? 's' : ''}`;
}

// ════════════════════════════════════════════════════════════════
window.addEventListener('scroll', () => {
  document.getElementById('jumpTop').classList.toggle('show', window.scrollY > 400);
}, {passive: true});

// ════════════════════════════════════════════════════════════════
buildSidebar();
renderHome();
</script>
